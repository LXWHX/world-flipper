<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap" rel="stylesheet">
  <script src="image-slot.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'M PLUS Rounded 1c', sans-serif; background: #8FCCE8; }
    @keyframes wfFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes wfPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  </style>
</helmet>

<div style="width: 100%; height: 100vh; display: flex; justify-content: center; align-items: stretch; background: repeating-conic-gradient(#84C4E2 0% 25%, #8FCCE8 0% 50%) 0 0 / 28px 28px;">
  <div style="width: min(430px, 100%); height: 100%; display: flex; flex-direction: column; background: linear-gradient(180deg, #D8F1FB 0%, #B4E3F5 55%, #C9ECF8 100%); box-shadow: 0 0 40px rgba(30, 80, 110, 0.35); position: relative; overflow: hidden;">

    <!-- ===== Top status bar ===== -->
    <div style="flex: none; display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #3E4450; border-bottom-left-radius: 14px; border-bottom-right-radius: 14px; box-shadow: 0 3px 0 rgba(0,0,0,0.15); z-index: 30;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <svg width="18" height="18" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="3" y="0" width="2" height="2" fill="#FFD35C"></rect><rect x="1" y="2" width="6" height="2" fill="#FFB03A"></rect><rect x="2" y="4" width="4" height="2" fill="#F0526E"></rect><rect x="3" y="6" width="2" height="2" fill="#C83A56"></rect></svg>
        <div style="color: #FFFFFF; font-weight: 900; font-size: 13px; letter-spacing: 1px;">WORLD FLIPPER <span style="color: #7ED8F2;">MUSEUM</span></div>
      </div>
      <div style="flex: 1;"></div>
      <sc-if value="{{ showCounters }}" hint-placeholder-val="{{ true }}">
        <div style="display: flex; gap: 8px;">
          <div style="display: flex; align-items: center; gap: 5px; background: #2E333D; border-radius: 999px; padding: 3px 10px 3px 6px;">
            <svg width="12" height="12" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="2" y="0" width="4" height="2" fill="#8BE86E"></rect><rect x="1" y="2" width="6" height="3" fill="#4ECB4E"></rect><rect x="2" y="5" width="4" height="2" fill="#2E9E3C"></rect></svg>
            <span style="color: #FFFFFF; font-size: 11px; font-weight: 700;">1,108</span>
          </div>
          <div style="display: flex; align-items: center; gap: 5px; background: #2E333D; border-radius: 999px; padding: 3px 10px 3px 6px;">
            <svg width="12" height="12" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="2" y="1" width="4" height="2" fill="#D9A6F5"></rect><rect x="1" y="3" width="6" height="2" fill="#A66FE0"></rect><rect x="2" y="5" width="4" height="2" fill="#7B44BE"></rect></svg>
            <span style="color: #FFFFFF; font-size: 11px; font-weight: 700;">5,325</span>
          </div>
        </div>
      </sc-if>
    </div>

    <!-- ===== Screen area ===== -->
    <div style="flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column;">

      <!-- ===== HOME ===== -->
      <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
        <div data-screen-label="Home" style="position: absolute; inset: 0; display: flex; flex-direction: column;">

          <!-- Hero key visual -->
          <div style="position: absolute; inset: 0;">
            <img src="menu-img/normal_background.png" alt="" style="width: 100%; height: 100%; display: block; object-fit: cover; object-position: center top;">
            <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(180,227,245,0.02) 48%, rgba(255,255,255,0.18) 100%); pointer-events: none;"></div>
          </div>

          <!-- Diagonal title slash -->
          <div style="position: relative; z-index: 5; margin: 14px 0 0 -6px; width: 78%; background: #FFFFFF; padding: 12px 18px 12px 22px; clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%); box-shadow: 0 4px 0 rgba(62, 68, 80, 0.12);">
            <div style="font-size: 22px; font-weight: 900; color: #3E4450; line-height: 1.05; letter-spacing: 0.5px;">WORLD FLIPPER</div>
            <div style="font-size: 13px; font-weight: 800; color: #F0526E; letter-spacing: 4px;">MUSEUM &amp; ARCHIVE</div>
          </div>

          <!-- Right-side quick buttons (slanted tag: semicircle icon + rectangle) -->
          <div style="position: absolute; right: 0; top: 71%; z-index: 5; display: flex; flex-direction: column; gap: 18px; align-items: flex-end;">
            <button onClick="{{ toggleMenu }}" style="border: none; cursor: pointer; background: #FFFFFF; border-radius: 22px 0 0 22px; height: 44px; padding: 0 20px 0 10px; box-shadow: 0 3px 0 rgba(62,68,80,0.2); font-family: inherit; display: flex; align-items: center; gap: 7px; transform: rotate(-15deg) translateX(12px); transform-origin: right center;" style-hover="transform: rotate(-15deg) translateX(6px);">
              <svg width="17" height="17" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="1" y="1" width="6" height="1" fill="#3E4450"></rect><rect x="1" y="3" width="6" height="1" fill="#3E4450"></rect><rect x="1" y="5" width="4" height="1" fill="#3E4450"></rect></svg>
              <span style="font-size: 11px; font-weight: 800; color: #3E4450;">News</span>
            </button>
            <button onClick="{{ toggleMenu }}" style="border: none; cursor: pointer; background: #FFFFFF; border-radius: 22px 0 0 22px; height: 44px; padding: 0 20px 0 10px; box-shadow: 0 3px 0 rgba(62,68,80,0.2); font-family: inherit; display: flex; align-items: center; gap: 7px; transform: rotate(-15deg) translateX(12px); transform-origin: right center;" style-hover="transform: rotate(-15deg) translateX(6px);">
              <svg width="17" height="17" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="1" y="2" width="6" height="4" fill="#3E4450"></rect><rect x="2" y="3" width="4" height="1" fill="#FFFFFF"></rect></svg>
              <span style="font-size: 11px; font-weight: 800; color: #3E4450;">About</span>
            </button>
          </div>

          <!-- Left-side big tag (mirrored) -->
          <div style="position: absolute; left: 0; top: 71%; z-index: 5; display: flex; flex-direction: column; align-items: flex-start;">
            <button onClick="{{ goStory }}" style="border: none; cursor: pointer; background: #FFFFFF; border-radius: 0 38px 38px 0; height: 76px; padding: 0 18px 0 30px; box-shadow: 0 3px 0 rgba(62,68,80,0.2); font-family: inherit; display: flex; align-items: center; gap: 9px; transform: rotate(15deg) translateX(-16px); transform-origin: left center;" style-hover="transform: rotate(15deg) translateX(-8px);">
              <span style="font-size: 17px; font-weight: 900; color: #3E4450;">Story</span>
              <svg width="30" height="30" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="2" y="1" width="6" height="8" fill="#3E4450"></rect><rect x="3" y="3" width="4" height="1" fill="#FFFFFF"></rect><rect x="3" y="5" width="4" height="1" fill="#FFFFFF"></rect></svg>
            </button>
          </div>

          <!-- White base under the action cluster -->
          <div style="position: absolute; left: 0; right: 0; bottom: 0; z-index: 5; height: 120px; pointer-events: none;">
            <svg width="100%" height="100%" viewBox="0 0 430 120" preserveAspectRatio="none" style="display: block;">
              <path d="M 0 34 L 138 56 Q 215 122 292 56 L 430 34 L 430 120 L 0 120 Z" fill="#DFE7EE"></path>
              <path d="M 0 40 L 138 62 Q 215 128 292 62 L 430 40 L 430 120 L 0 120 Z" fill="#FFFFFF"></path>
            </svg>
          </div>

          <!-- Bottom action cluster -->
          <div style="position: absolute; left: 0; right: 0; bottom: 10px; z-index: 6; display: flex; align-items: flex-end; justify-content: center; gap: 16px; padding: 0 8px;">
            <button onClick="{{ goArt }}" style="flex: 1; max-width: 132px; width: 132px; height: 60px; border: none; cursor: pointer; background: linear-gradient(180deg, #5FC0EC 0%, #3FA6DD 100%); color: #FFFFFF; display: flex; align-items: center; justify-content: center; padding-top: 10px; font-family: inherit; font-weight: 800; font-size: 14px; box-shadow: inset 0 -4px 0 #2A80B5, inset 0 2px 0 rgba(255,255,255,0.4); margin-bottom: -4px; clip-path: path('M 16 60 L 116 60 Q 132 60 132 44 L 132 27 Q 132 14 119 15.7 L 15 1.9 Q 0 0 0 15 L 0 44 Q 0 60 16 60 Z');" style-hover="filter: brightness(1.07);" style-active="transform: translateY(2px);">
              <span style="display: flex; align-items: center; gap: 6px;">
                <svg width="15" height="15" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="1" y="1" width="6" height="6" fill="#FFFFFF"></rect><rect x="2" y="4" width="2" height="2" fill="#4ECB4E"></rect><rect x="4" y="2" width="2" height="2" fill="#FFD35C"></rect></svg>
                Gallery
              </span>
            </button>
            <button onClick="{{ goUnits }}" style="width: 120px; height: 120px; flex: none; border: none; cursor: pointer; border-radius: 50%; background: radial-gradient(circle at 50% 32%, #FF7A8E 0%, #F0526E 55%, #D63B58 100%); box-shadow: 0 0 0 6px #FFFFFF, 0 6px 0 6px #C9CFDA, inset 0 3px 0 rgba(255,255,255,0.45); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-family: inherit; animation: wfPulse 3s ease-in-out infinite;" style-hover="filter: brightness(1.08);" style-active="transform: scale(0.95);">
              <svg width="34" height="34" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="4" y="0" width="2" height="2" fill="#FFFFFF"></rect><rect x="2" y="2" width="6" height="2" fill="#FFFFFF"></rect><rect x="1" y="4" width="8" height="2" fill="#FFE1E7"></rect><rect x="2" y="6" width="2" height="2" fill="#FFFFFF"></rect><rect x="6" y="6" width="2" height="2" fill="#FFFFFF"></rect></svg>
              <span style="color: #FFFFFF; font-weight: 900; font-size: 16px; letter-spacing: 0.5px;">Characters</span>
            </button>
            <button onClick="{{ goMusic }}" style="flex: 1; max-width: 132px; width: 132px; height: 60px; border: none; cursor: pointer; background: linear-gradient(180deg, #5FC0EC 0%, #3FA6DD 100%); color: #FFFFFF; display: flex; align-items: center; justify-content: center; padding-top: 10px; font-family: inherit; font-weight: 800; font-size: 14px; box-shadow: inset 0 -4px 0 #2A80B5, inset 0 2px 0 rgba(255,255,255,0.4); margin-bottom: -4px; clip-path: path('M 16 60 L 116 60 Q 132 60 132 44 L 132 15 Q 132 0 117 1.9 L 13 15.7 Q 0 14 0 27 L 0 44 Q 0 60 16 60 Z');" style-hover="filter: brightness(1.07);" style-active="transform: translateY(2px);">
              <span style="display: flex; align-items: center; gap: 6px;">
                <svg width="15" height="15" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="4" y="0" width="2" height="5" fill="#FFFFFF"></rect><rect x="2" y="5" width="3" height="2" fill="#FFFFFF"></rect></svg>
                Music
              </span>
            </button>
          </div>
        </div>
      </sc-if>

      <!-- ===== SECTION SCREENS (nav shell placeholders) ===== -->
      <sc-if value="{{ isSection }}" hint-placeholder-val="{{ false }}">
        <div data-screen-label="{{ sectionLabel }}" style="position: absolute; inset: 0; display: flex; flex-direction: column; overflow-y: auto;">
          <!-- Section banner -->
          <div style="flex: none; position: relative; margin: 14px 0 0 -6px; width: 82%; background: #FFFFFF; padding: 12px 18px 12px 22px; clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); box-shadow: 0 4px 0 rgba(62, 68, 80, 0.12); display: flex; align-items: center; gap: 12px;">
            <div style="width: 42px; height: 42px; border-radius: 50%; flex: none; background: {{ sectionColor }}; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="3" y="0" width="2" height="2" fill="#FFFFFF"></rect><rect x="1" y="2" width="6" height="2" fill="#FFFFFF"></rect><rect x="2" y="4" width="4" height="2" fill="#FFFFFF"></rect><rect x="3" y="6" width="2" height="2" fill="#FFFFFF"></rect></svg>
            </div>
            <div>
              <div style="font-size: 19px; font-weight: 900; color: #3E4450; line-height: 1.1;">{{ sectionLabel }}</div>
              <div style="font-size: 11px; font-weight: 700; color: #8A93A5;">{{ sectionDesc }}</div>
            </div>
          </div>

          <!-- Placeholder content card -->
          <div style="flex: none; margin: 20px 14px; background: #FFFFFF; border-radius: 18px; box-shadow: 0 4px 0 rgba(62,68,80,0.12); padding: 26px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;">
            <div style="animation: wfFloat 3s ease-in-out infinite;">
              <svg width="56" height="56" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="4" y="0" width="2" height="2" fill="{{ sectionColor }}"></rect><rect x="2" y="2" width="6" height="2" fill="{{ sectionColor }}"></rect><rect x="1" y="4" width="8" height="2" fill="{{ sectionColor }}" opacity="0.55"></rect><rect x="2" y="6" width="2" height="2" fill="{{ sectionColor }}"></rect><rect x="6" y="6" width="2" height="2" fill="{{ sectionColor }}"></rect></svg>
            </div>
            <div style="font-size: 17px; font-weight: 900; color: #3E4450;">Under Construction</div>
            <div style="font-size: 12.5px; font-weight: 700; color: #8A93A5; max-width: 260px;">This wing of the museum opens soon. Content for {{ sectionLabel }} will live here.</div>
            <image-slot id="{{ sectionSlotId }}" shape="rounded" radius="14" placeholder="Drop a preview image for this section" style="width: 100%; height: 150px;"></image-slot>
            <button onClick="{{ goHome }}" style="border: none; cursor: pointer; background: linear-gradient(180deg, #5FC0EC 0%, #3FA6DD 100%); color: #FFFFFF; border-radius: 999px; padding: 10px 26px; font-family: inherit; font-weight: 800; font-size: 13px; box-shadow: 0 3px 0 #2A80B5, inset 0 2px 0 rgba(255,255,255,0.4);" style-active="transform: translateY(2px); box-shadow: 0 1px 0 #2A80B5;">Back to Home</button>
          </div>
        </div>
      </sc-if>

      <!-- ===== MENU OVERLAY (white card list) ===== -->
      <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
        <div data-screen-label="Menu" style="position: absolute; inset: 0; z-index: 40; background: rgba(40, 60, 80, 0.35); display: flex; justify-content: flex-end;" onClick="{{ closeMenu }}">
          <div style="width: 78%; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 10px; padding-right: 0;">
            <sc-for list="{{ menuItems }}" as="mi" hint-placeholder-count="6">
              <button onClick="{{ mi.onClick }}" style="border: none; cursor: pointer; background: #FFFFFF; border-radius: 999px 0 0 999px; padding: 10px 14px 10px 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 0 rgba(30,50,70,0.2); font-family: inherit; text-align: left; margin-left: 18px;" style-hover="transform: translateX(-6px);">
                <div style="width: 46px; height: 46px; flex: none; border-radius: 50%; background: {{ mi.color }}; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;">
                  <svg width="22" height="22" viewBox="0 0 8 8" style="shape-rendering: crispedges;"><rect x="3" y="0" width="2" height="2" fill="#FFFFFF"></rect><rect x="1" y="2" width="6" height="2" fill="#FFFFFF"></rect><rect x="2" y="4" width="4" height="2" fill="#FFFFFF"></rect><rect x="3" y="6" width="2" height="2" fill="#FFFFFF"></rect></svg>
                </div>
                <div style="flex: 1;">
                  <div style="font-size: 16px; font-weight: 900; color: #3E4450;">{{ mi.label }}</div>
                  <div style="font-size: 10.5px; font-weight: 700; color: #8A93A5;">{{ mi.sub }}</div>
                </div>
              </button>
            </sc-for>
          </div>
        </div>
      </sc-if>
    </div>

    <!-- ===== Bottom tab bar ===== -->
    <div style="flex: none; z-index: 50; background: #FFFFFF; border-top: 2px solid #E3E9F0; display: flex; align-items: stretch; padding: 6px 6px calc(6px + env(safe-area-inset-bottom));">
      <button onClick="{{ goHome }}" style="flex: 1; border: none; cursor: pointer; font-family: inherit; border-radius: 12px; padding: 7px 2px 5px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: {{ tabBgHome }}; color: {{ tabColHome }};">
        <svg width="20" height="20" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="4" y="1" width="2" height="2" fill="currentColor"></rect><rect x="2" y="3" width="6" height="2" fill="currentColor"></rect><rect x="2" y="5" width="6" height="4" fill="currentColor"></rect><rect x="4" y="7" width="2" height="2" fill="#B4E3F5"></rect></svg>
        <span style="font-size: 10px; font-weight: 800;">Home</span>
      </button>
      <button onClick="{{ goArt }}" style="flex: 1; border: none; cursor: pointer; font-family: inherit; border-radius: 12px; padding: 7px 2px 5px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: {{ tabBgArt }}; color: {{ tabColArt }};">
        <svg width="20" height="20" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="1" y="1" width="8" height="8" fill="currentColor"></rect><rect x="2" y="5" width="3" height="3" fill="#8BE86E"></rect><rect x="5" y="2" width="3" height="3" fill="#FFD35C"></rect></svg>
        <span style="font-size: 10px; font-weight: 800;">Art</span>
      </button>
      <button onClick="{{ goUnits }}" style="flex: 1; border: none; cursor: pointer; font-family: inherit; border-radius: 12px; padding: 7px 2px 5px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: {{ tabBgUnits }}; color: {{ tabColUnits }};">
        <svg width="20" height="20" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="3" y="1" width="4" height="4" fill="currentColor"></rect><rect x="2" y="6" width="6" height="3" fill="currentColor"></rect></svg>
        <span style="font-size: 10px; font-weight: 800;">Units</span>
      </button>
      <button onClick="{{ goStory }}" style="flex: 1; border: none; cursor: pointer; font-family: inherit; border-radius: 12px; padding: 7px 2px 5px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: {{ tabBgStory }}; color: {{ tabColStory }};">
        <svg width="20" height="20" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="2" y="1" width="6" height="8" fill="currentColor"></rect><rect x="3" y="3" width="4" height="1" fill="#B4E3F5"></rect><rect x="3" y="5" width="4" height="1" fill="#B4E3F5"></rect></svg>
        <span style="font-size: 10px; font-weight: 800;">Story</span>
      </button>
      <button onClick="{{ goMusic }}" style="flex: 1; border: none; cursor: pointer; font-family: inherit; border-radius: 12px; padding: 7px 2px 5px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: {{ tabBgMusic }}; color: {{ tabColMusic }};">
        <svg width="20" height="20" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="5" y="1" width="2" height="6" fill="currentColor"></rect><rect x="3" y="6" width="3" height="3" fill="currentColor"></rect><rect x="7" y="1" width="2" height="2" fill="currentColor"></rect></svg>
        <span style="font-size: 10px; font-weight: 800;">Music</span>
      </button>
      <button onClick="{{ toggleMenu }}" style="flex: 1; border: none; cursor: pointer; font-family: inherit; border-radius: 12px; padding: 7px 2px 5px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: {{ tabBgMenu }}; color: {{ tabColMenu }};">
        <svg width="20" height="20" viewBox="0 0 10 10" style="shape-rendering: crispedges;"><rect x="2" y="2" width="6" height="1" fill="currentColor"></rect><rect x="2" y="4" width="6" height="1" fill="currentColor"></rect><rect x="2" y="6" width="6" height="1" fill="currentColor"></rect></svg>
        <span style="font-size: 10px; font-weight: 800;">Menu</span>
      </button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 430, &quot;height&quot;: 860 },
  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#FFA726&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#FFA726&quot;, &quot;#F0526E&quot;, &quot;#3FA6DD&quot;, &quot;#35C8B4&quot;], &quot;section&quot;: &quot;Theme&quot; },
  &quot;showCounters&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Top bar&quot; }
}">
class Component extends DCLogic {
  state = { tab: 'home', menuOpen: false };

  sections = {
    art:   { label: 'Art Gallery',  desc: 'Key visuals, character art & pixel sprites', color: '#F0526E' },
    units: { label: 'Characters',   desc: 'Unit profiles & episodes',                   color: '#FFA726' },
    story: { label: 'Story Archive',desc: 'Main story & event episodes',                color: '#3FA6DD' },
    music: { label: 'Music Room',   desc: 'BGM & soundtrack collection',                color: '#A66FE0' },
    arms:  { label: 'Armaments',    desc: 'Weapons & equipment',                        color: '#35C8B4' }
  };

  go(tab) { this.setState({ tab: tab, menuOpen: false }); }

  renderVals() {
    const tab = this.state.tab;
    const accent = this.props.accent ?? '#FFA726';
    const sec = this.sections[tab];
    const menuOrder = ['art', 'units', 'story', 'music', 'arms'];

    const vals = {
      isHome: tab === 'home',
      isSection: !!sec,
      menuOpen: this.state.menuOpen,
      showCounters: this.props.showCounters ?? true,
      sectionLabel: sec ? sec.label : '',
      sectionDesc: sec ? sec.desc : '',
      sectionColor: sec ? sec.color : '#3E4450',
      sectionSlotId: 'section-preview-' + tab,
      goHome: () => this.go('home'),
      goArt: () => this.go('art'),
      goUnits: () => this.go('units'),
      goStory: () => this.go('story'),
      goMusic: () => this.go('music'),
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false }),
      menuItems: menuOrder.map(id => ({
        label: this.sections[id].label,
        sub: this.sections[id].desc,
        color: this.sections[id].color,
        onClick: (e) => { e.stopPropagation(); this.go(id); }
      }))
    };

    ['Home', 'Art', 'Units', 'Story', 'Music', 'Menu'].forEach(name => {
      const id = name.toLowerCase();
      const active = id === 'menu' ? this.state.menuOpen : tab === id;
      vals['tabBg' + name] = active ? accent : 'transparent';
      vals['tabCol' + name] = active ? '#FFFFFF' : '#8A93A5';
    });

    return vals;
  }
}
</script>
</body>
</html>
